{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Backtest Complete</h2>
  <div class="stats">
    <div><b>Rows</b><br>{{ data_rows }}</div>
    <div><b>Start</b><br>{{ start }}</div>
    <div><b>End</b><br>{{ end }}</div>
    <div><b>Avg spread</b><br>{{ avg_spread }} moves</div>
    <div><b>Max spread</b><br>{{ max_spread }} moves</div>
  </div>
  <div class="actions">
    <a href="/report" target="_blank">Open HTML Report</a>
    <a href="/download">Download Results ZIP</a>
    <a href="/">Run Another Test</a>
  </div>
</section>

<section class="card">
  <h2>Preset Summary</h2>
  <div class="table-wrap">
    {{ table_html|safe }}
  </div>
</section>
{% endblock %}
