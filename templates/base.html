<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>EdgeFlow Terminal Pro — Backtest Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div>
      <h1>EdgeFlow Terminal Pro</h1>
      <p>Backtest Lab V1 — Strategy first, live signals later</p>
    </div>
  </header>
  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {% for m in messages %}<p>{{ m }}</p>{% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
