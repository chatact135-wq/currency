<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MarketMind AI V30</title>
<style>
body{margin:0;font-family:Arial;background:#06101f;color:#eef6ff}header{padding:22px;background:#07111f;border-bottom:1px solid #345985;position:sticky;top:0}h1{margin:0}.sub,.status,.small{color:#9fb2cc}.wrap{max-width:1600px;margin:auto;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(430px,1fr));gap:18px}.card{background:linear-gradient(160deg,#101d31,#173457);border:1px solid #3a68a0;border-radius:20px;padding:20px}.top{display:flex;justify-content:space-between}.asset{font-size:25px;font-weight:800}.price{font-size:28px;margin-top:12px}.pill{border-radius:999px;padding:10px 14px;font-weight:900}.buy{color:#2ed47a;border:1px solid #2ed47a}.sell{color:#ff6464;border:1px solid #ff6464}.wait{color:#f2c94c;border:1px solid #f2c94c}.warn{margin-top:14px;padding:12px;border-radius:12px;background:rgba(255,197,66,.12);color:#ffe0a3}.boxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.box{background:rgba(255,255,255,.05);border-radius:13px;padding:11px}.label{color:#9fb2cc;font-size:12px}.val{font-size:18px;font-weight:800;margin-top:5px}.title{margin-top:18px;color:#58a6ff;font-weight:900}.alert{margin-top:8px;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px}.alert.sell{color:#ffd6d6}.alert.buy{color:#d6ffe8}.alert.neutral{color:#fff0b8}.err{border-color:#ff7676}.errorbox{color:#ffd2d2}
</style>
<style>
.alert-panel{
  max-width:1180px;
  margin:16px auto;
  padding:14px;
  border:1px solid rgba(52,211,153,.45);
  background:linear-gradient(180deg,rgba(15,37,63,.92),rgba(10,26,46,.92));
  border-radius:16px;
  color:#dbeafe;
  box-shadow:0 8px 28px rgba(0,0,0,.24);
}
.alert-panel h2{
  margin:0 0 8px;
  color:#7dd3fc;
  font-size:18px;
}
.alert-toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
  align-items:center;
}
.alert-badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-weight:700;
  font-size:12px;
  border:1px solid rgba(255,255,255,.18);
}
.alert-badge.ok{background:rgba(34,197,94,.18);color:#86efac}
.alert-badge.warn{background:rgba(250,204,21,.18);color:#fde68a}
.alert-badge.danger{background:rgba(248,113,113,.18);color:#fecaca}
.alert-list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:10px;
}
.alert-item{
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(148,163,184,.25);
  background:rgba(15,23,42,.55);
}
.alert-item strong{color:#fff}
.alert-item .meta{font-size:12px;color:#93c5fd;margin-top:4px}
.alert-item.warning{border-color:rgba(250,204,21,.45)}
.alert-item.trade_watch{border-color:rgba(34,197,94,.45)}
.alert-item.info{border-color:rgba(96,165,250,.45)}
.alert-empty{color:#94a3b8;font-size:14px}
.alert-button{
  background:#1d4ed8;
  border:0;
  color:white;
  padding:7px 10px;
  border-radius:9px;
  cursor:pointer;
  font-weight:700;
}
.alert-button.secondary{background:#334155}
.latest-alert{
  margin:8px 0 10px;
  padding:8px 10px;
  border-radius:10px;
  background:rgba(250,204,21,.12);
  border:1px solid rgba(250,204,21,.35);
  color:#fde68a;
  display:none;
}
</style>


<style>
.usage-panel{max-width:1180px;margin:12px auto;padding:12px 14px;border-radius:16px;border:1px solid rgba(96,165,250,.4);background:rgba(15,23,42,.82);color:#e0f2fe}
.usage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-top:8px}
.usage-box{padding:9px;border:1px solid rgba(148,163,184,.25);border-radius:12px;background:rgba(30,41,59,.6)}
.usage-box b{display:block;color:#93c5fd;font-size:12px}
.usage-box span{font-size:18px;font-weight:800}
.usage-small{font-size:12px;color:#bfdbfe;margin-top:6px}
</style>

</head><body>


<div class="usage-panel" id="apiUsagePanel">
  <b>📊 API Usage Meter</b>
  <div class="usage-grid">
    <div class="usage-box"><b>This refresh</b><span id="usageRefresh">-</span></div>
    <div class="usage-box"><b>Per minute</b><span id="usageMinute">-</span></div>
    <div class="usage-box"><b>Per hour</b><span id="usageHour">-</span></div>
    <div class="usage-box"><b>Per day</b><span id="usageDay">-</span></div>
    <div class="usage-box"><b>Total since start</b><span id="usageTotal">-</span></div>
  </div>
  <div class="usage-small" id="usageBreakdown">Loading usage...</div>
</div>

<div class="alert-panel" id="liveAlertsPanel">
  <h2>🔔 Live Market Alerts</h2>
  <div class="alert-toolbar">
    <span id="alertsStatus" class="alert-badge ok">Loading alerts...</span>
    <span class="alert-badge warn">Inside dashboard</span>
    <button class="alert-button" onclick="refreshAlertsNow()">Refresh Alerts</button>
    <button class="alert-button secondary" onclick="toggleAlertSound()">Sound: <span id="soundState">OFF</span></button>
  </div>
  <div id="latestAlertBanner" class="latest-alert"></div>
  <div id="alertsList" class="alert-list">
    <div class="alert-empty">No alerts loaded yet.</div>
  </div>
</div>
<header><h1>MarketMind AI V30 — API Usage Meter</h1><div class="sub">Precision trigger • adaptive edge • clear exit rules</div><div id="status" class="status">Loading...</div></header><div class="wrap"><div id="grid" class="grid"></div></div>
<script>
const refresh={{ refresh }};let sigs=[];const grid=document.getElementById("grid"),status=document.getElementById("status");
function fmt(sec){sec=Math.max(0,Math.floor(sec||0));let m=Math.floor(sec/60),s=sec%60;return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function cls(x){if(!x)return"wait";if(x.includes("BUY"))return"buy";if(x.includes("SELL"))return"sell";return"wait"}
function acls(d){if(d==="BUY")return"buy";if(d==="SELL")return"sell";return"neutral"}
function alerts(s,l){return (s.alerts||[]).filter(a=>a.layer===l)}
function render(arr){return arr.length?arr.map(a=>`<div class="alert ${acls(a.direction)}"><b>${a.model}</b> • ${a.direction} • ${a.score}<br><span class="small">${a.message}<br>${a.strategy}</span></div>`).join(""):`<div class="alert neutral">No active alert.</div>`}
function card(s,i){if(s.status!=="live")return `<div class="card err"><div class="asset">${s.display||s.asset}</div><div class="errorbox">⚠️ ${s.message}<br>${s.error||""}</div></div>`;
let p=s.plan,ad=s.adaptive||{};let entry=p.has_exact_entry?`${p.exact_entry} (${p.entry_pips} pips)`:p.exact_entry;
return `<div class="card"><div class="top"><div><div class="asset">${s.display}</div><div class="small">${s.source} • candles ${s.stored_candles}</div></div><div class="pill ${cls(s.final_action)}">${s.final_action}</div></div><div class="price">Price: <b>${s.price}</b></div><div class="small"><b>LIVE PRICE CHECK:</b> ${s.data_fresh ? "OK" : "STALE / DO NOT TRADE"} • live cache ${s.live_price_cache_age??"-"}s • candle close ${s.candle_close_price??"-"} • diff ${s.price_difference_from_candle??"-"}</div><div class="small">Grade ${s.grade} • Confidence ${s.confidence}% • Adaptive ${ad.probability?ad.probability+"%":ad.status} • Samples ${ad.samples||0} • Entry: ${s.entry_permission||"NO_ENTRY"}</div><div class="warn">${s.data_fresh===false ? "<b>DATA STALE — DO NOT TRADE</b><br>" : ""}<b>NEWS COUNTDOWN:</b> ${s.news && s.news.next_event ? `${s.news.next_event.currency} ${s.news.next_event.impact} — ${s.news.next_event.countdown}<br>${s.news.next_event.title}<br>Actual: ${s.news.next_event.actual??"-"} • Forecast: ${s.news.next_event.forecast??"-"} • Previous: ${s.news.next_event.previous??"-"}<br>Surprise: ${s.news.next_event.surprise_analysis ? s.news.next_event.surprise_analysis.surprise : "-"}<br>Bias: ${s.news.next_event.surprise_analysis ? s.news.next_event.surprise_analysis.currency_bias : "-"}<br>Effect: ${s.news.next_event.expected_effect??"-"}` : "No near news"}<br><b>NEWS MODE:</b> ${s.news ? `${s.news.mode} / ${s.news.risk}` : "NORMAL"}<br><br><b>FINAL DECISION:</b> ${s.final_decision ? s.final_decision.final_action : s.final_action}<br><b>COMMAND:</b> ${s.final_decision ? s.final_decision.command : ""}<br><b>TIME:</b> ${s.time_forecast ? s.time_forecast.summary : ""}<br><span class="small">${s.conflict_interpretation}<br>${s.decision_reason||""}</span></div><div class="box" style="margin-top:12px;border:1px solid #58a6ff"><div class="label">BEST ACTION</div><div class="val">${s.best_action?s.best_action.label:"-"}</div><div class="small">${s.best_action?s.best_action.instruction:""}<br>Trigger: ${s.best_action?s.best_action.trigger:""}<br>Cancel: ${s.best_action?s.best_action.cancel:""}</div></div><div class="boxes"><div class="box"><div class="label">Adaptive Edge</div><div class="val">${ad.expected_edge_r??"-"} R</div></div><div class="box"><div class="label">Probability</div><div class="val small">Up ${s.probabilities.up}% / Down ${s.probabilities.down}%</div></div><div class="box"><div class="label">History Memory</div><div class="val small">${s.history_memory ? `${s.history_memory.message}<br>Breaks: ${s.history_memory.breaks} • Success: ${s.history_memory.success_rate??"-"}%` : "-"}</div></div><div class="box"><div class="label">Entry</div><div class="val small">${entry}<br>Setup: ${p.setup_zone||"-"}<br>Trigger: ${p.trigger_level||"-"}</div></div><div class="box"><div class="label">Timer</div><div class="val timer" data-i="${i}">${fmt(s.timer_seconds)}</div></div></div><div class="title">Master Bias</div>${render(alerts(s,"Master Bias"))}<div class="title">Execution</div>${render(alerts(s,"Execution"))}<div class="title">Close / Exit Plan</div><div class="small">${s.close_rules ? `${s.close_rules.partial_close}<br>${s.close_rules.full_close}<br>${s.close_rules.emergency_close}<br>${s.close_rules.trailing_stop}` : ""}</div><div class="title">FAST MOVE ALERTS</div><div class="small">${s.alerts && s.alerts.length ? s.alerts.slice(-3).map(a => `<b>${a.title}</b> — ${a.action}<br>${a.reason}`).join("<br><br>") : "No fast alerts yet."}</div><div class="title">TRIGGER STATE / MARKET REGIME</div><div class="small">${s.trigger_state ? `State: ${s.trigger_state.state}<br>${s.trigger_state.message}<br>Permission: ${s.trigger_state.entry_permission}` : ""}<br>${s.regime_guard ? `Regime: ${s.regime_guard.mode}<br>Risks: ${s.regime_guard.regimes.join(", ")}<br>${s.regime_guard.reasons.join("<br>")}` : ""}</div><div class="title">SIMPLE TRADE PLAN</div><div class="small">${s.market_map && s.market_map.simple_trade_plan ? `<b>${s.market_map.simple_trade_plan.headline}</b><br>${s.market_map.simple_trade_plan.simple_steps.join("<br>")}` : ""}</div><div class="title">MARKET MAP</div><div class="small">${s.market_map ? `Command: ${s.market_map.trade_map.command}<br>Buy switch: ${s.market_map.switch_levels.buy_switch} (${s.market_map.switch_levels.buy_distance_pips} pips)<br>Sell switch: ${s.market_map.switch_levels.sell_switch} (${s.market_map.switch_levels.sell_distance_pips} pips)<br>Aggressive entry: ${s.market_map.trade_map.aggressive_entry??"-"}<br>Safe entry: ${s.market_map.trade_map.safe_entry??"-"}<br>SL: ${s.market_map.trade_map.stop_loss??"-"} • TP1: ${s.market_map.trade_map.tp1_partial_close??"-"} • TP2: ${s.market_map.trade_map.tp2??"-"} • Full: ${s.market_map.trade_map.full_close??"-"}<br>${s.market_map.switch_levels.flip_rule}` : ""}</div><div class="title">Logic</div><div class="small">${s.logic_note}</div></div>`}
async function load(){status.textContent="Updating V30 signals...";try{let r=await fetch("/api/v30/signals",{cache:"no-store"});let d=await r.json();sigs=d.signals||[];grid.innerHTML=sigs.map(card).join("");status.textContent=`Last updated ${new Date().toLocaleTimeString()} • next update in ${refresh}s`;}catch(e){status.textContent="Error: "+e}}
setInterval(()=>{document.querySelectorAll(".timer").forEach(el=>{let i=+el.dataset.i;if(sigs[i]){sigs[i].timer_seconds=Math.max(0,sigs[i].timer_seconds-1);el.textContent=fmt(sigs[i].timer_seconds)}})},1000);
load();setInterval(load,refresh*1000);
</script>
<script>
let alertSoundEnabled = false;
let lastAlertKey = "";
let alertsTimer = null;

function toggleAlertSound(){
  alertSoundEnabled = !alertSoundEnabled;
  const s = document.getElementById("soundState");
  if(s) s.textContent = alertSoundEnabled ? "ON" : "OFF";
  if(alertSoundEnabled) playAlertBeep(false);
}

function playAlertBeep(force=true){
  if(!alertSoundEnabled && force) return;
  try{
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 880;
    gain.gain.value = 0.08;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    setTimeout(()=>{osc.stop();ctx.close();}, 160);
  }catch(e){}
}

function alertClass(a){
  if(!a) return "info";
  const sev = (a.severity || "info").toLowerCase();
  if(sev.includes("warning")) return "warning";
  if(sev.includes("trade")) return "trade_watch";
  return "info";
}

function formatAlert(a){
  const title = a.title || "Alert";
  const action = a.action || "-";
  const reason = a.reason || "";
  const asset = a.asset || "";
  const price = a.price ?? "-";
  const time = a.time ? new Date(a.time).toLocaleTimeString() : "";
  return `
    <div class="alert-item ${alertClass(a)}">
      <strong>${asset} — ${title}</strong><br>
      Action: ${action}<br>
      ${reason}
      <div class="meta">Price: ${price} • ${time}</div>
    </div>`;
}

async function fetchDashboardAlerts(){
  const status = document.getElementById("alertsStatus");
  const list = document.getElementById("alertsList");
  const banner = document.getElementById("latestAlertBanner");
  if(!list) return;
  try{
    const r = await fetch("/api/v30/alerts", {cache:"no-store"});
    const data = await r.json();
    const alerts = data.alerts || [];
    if(status){
      status.textContent = alerts.length ? `${alerts.length} alerts` : "No alerts";
      status.className = alerts.length ? "alert-badge warn" : "alert-badge ok";
    }
    if(!alerts.length){
      list.innerHTML = `<div class="alert-empty">No fast move alerts yet. Keep dashboard open.</div>`;
      if(banner) banner.style.display = "none";
      return;
    }
    list.innerHTML = alerts.slice(0,6).map(formatAlert).join("");
    const newest = alerts[0];
    const key = `${newest.asset}-${newest.title}-${newest.time}`;
    if(lastAlertKey && key !== lastAlertKey){
      if(banner){
        banner.innerHTML = `<b>New alert:</b> ${newest.asset} — ${newest.title} — ${newest.action}`;
        banner.style.display = "block";
      }
      playAlertBeep(true);
    }
    lastAlertKey = key;
  }catch(e){
    if(status){
      status.textContent = "Alerts error";
      status.className = "alert-badge danger";
    }
    list.innerHTML = `<div class="alert-empty">Could not load alerts. Check deployment/API.</div>`;
  }
}

function refreshAlertsNow(){ fetchDashboardAlerts(); }

document.addEventListener("DOMContentLoaded", ()=>{
  fetchDashboardAlerts();
  if(alertsTimer) clearInterval(alertsTimer);
  alertsTimer = setInterval(fetchDashboardAlerts, 5000);
});
</script>


<script>
async function fetchApiUsage(){
  try{
    const r = await fetch("/api/v30/usage?refresh_seconds=10", {cache:"no-store"});
    const u = await r.json();
    const est = u.estimate || {};
    const lr = u.last_refresh || {};
    const by = lr.calls || {};
    const set = (id,val)=>{const el=document.getElementById(id); if(el) el.textContent=val;};
    set("usageRefresh", est.per_refresh ?? "-");
    set("usageMinute", est.estimated_per_minute ?? "-");
    set("usageHour", est.estimated_per_hour ?? "-");
    set("usageDay", est.estimated_per_day ?? "-");
    set("usageTotal", u.total_calls_since_start ?? "-");
    const br = document.getElementById("usageBreakdown");
    if(br){
      const parts = Object.entries(by).map(([k,v])=>`${k}: ${v}`);
      br.textContent = parts.length ? "Last refresh breakdown: " + parts.join(" • ") : "No calls counted yet.";
    }
  }catch(e){
    const br=document.getElementById("usageBreakdown");
    if(br) br.textContent="Could not load usage meter.";
  }
}
document.addEventListener("DOMContentLoaded", ()=>{
  fetchApiUsage();
  setInterval(fetchApiUsage, 5000);
});
</script>

</body></html>
