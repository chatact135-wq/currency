<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MarketMind AI V20</title>
<style>
body{margin:0;font-family:Arial;background:#06101f;color:#eef6ff}header{padding:22px;background:#07111f;border-bottom:1px solid #345985;position:sticky;top:0}h1{margin:0}.sub,.status,.small{color:#9fb2cc}.wrap{max-width:1600px;margin:auto;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(430px,1fr));gap:18px}.card{background:linear-gradient(160deg,#101d31,#173457);border:1px solid #3a68a0;border-radius:20px;padding:20px}.top{display:flex;justify-content:space-between}.asset{font-size:25px;font-weight:800}.price{font-size:28px;margin-top:12px}.pill{border-radius:999px;padding:10px 14px;font-weight:900}.buy{color:#2ed47a;border:1px solid #2ed47a}.sell{color:#ff6464;border:1px solid #ff6464}.wait{color:#f2c94c;border:1px solid #f2c94c}.warn{margin-top:14px;padding:12px;border-radius:12px;background:rgba(255,197,66,.12);color:#ffe0a3}.boxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.box{background:rgba(255,255,255,.05);border-radius:13px;padding:11px}.label{color:#9fb2cc;font-size:12px}.val{font-size:18px;font-weight:800;margin-top:5px}.title{margin-top:18px;color:#58a6ff;font-weight:900}.alert{margin-top:8px;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px}.alert.sell{color:#ffd6d6}.alert.buy{color:#d6ffe8}.alert.neutral{color:#fff0b8}.err{border-color:#ff7676}.errorbox{color:#ffd2d2}
</style></head><body><header><h1>MarketMind AI V20 — Final Decision + Time Forecast</h1><div class="sub">Precision trigger • adaptive edge • clear exit rules</div><div id="status" class="status">Loading...</div></header><div class="wrap"><div id="grid" class="grid"></div></div>
<script>
const refresh={{ refresh }};let sigs=[];const grid=document.getElementById("grid"),status=document.getElementById("status");
function fmt(sec){sec=Math.max(0,Math.floor(sec||0));let m=Math.floor(sec/60),s=sec%60;return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function cls(x){if(!x)return"wait";if(x.includes("BUY"))return"buy";if(x.includes("SELL"))return"sell";return"wait"}
function acls(d){if(d==="BUY")return"buy";if(d==="SELL")return"sell";return"neutral"}
function alerts(s,l){return (s.alerts||[]).filter(a=>a.layer===l)}
function render(arr){return arr.length?arr.map(a=>`<div class="alert ${acls(a.direction)}"><b>${a.model}</b> • ${a.direction} • ${a.score}<br><span class="small">${a.message}<br>${a.strategy}</span></div>`).join(""):`<div class="alert neutral">No active alert.</div>`}
function card(s,i){if(s.status!=="live")return `<div class="card err"><div class="asset">${s.display||s.asset}</div><div class="errorbox">⚠️ ${s.message}<br>${s.error||""}</div></div>`;
let p=s.plan,ad=s.adaptive||{};let entry=p.has_exact_entry?`${p.exact_entry} (${p.entry_pips} pips)`:p.exact_entry;
return `<div class="card"><div class="top"><div><div class="asset">${s.display}</div><div class="small">${s.source} • candles ${s.stored_candles}</div></div><div class="pill ${cls(s.final_action)}">${s.final_action}</div></div><div class="price">Price: <b>${s.price}</b></div><div class="small">Grade ${s.grade} • Confidence ${s.confidence}% • Adaptive ${ad.probability?ad.probability+"%":ad.status} • Samples ${ad.samples||0} • Entry: ${s.entry_permission||"NO_ENTRY"}</div><div class="warn"><b>FINAL DECISION:</b> ${s.final_decision ? s.final_decision.final_action : s.final_action}<br><b>COMMAND:</b> ${s.final_decision ? s.final_decision.command : ""}<br><b>TIME:</b> ${s.time_forecast ? s.time_forecast.summary : ""}<br><span class="small">${s.conflict_interpretation}<br>${s.decision_reason||""}</span></div><div class="box" style="margin-top:12px;border:1px solid #58a6ff"><div class="label">BEST ACTION</div><div class="val">${s.best_action?s.best_action.label:"-"}</div><div class="small">${s.best_action?s.best_action.instruction:""}<br>Trigger: ${s.best_action?s.best_action.trigger:""}<br>Cancel: ${s.best_action?s.best_action.cancel:""}</div></div><div class="boxes"><div class="box"><div class="label">Adaptive Edge</div><div class="val">${ad.expected_edge_r??"-"} R</div></div><div class="box"><div class="label">Probability</div><div class="val small">Up ${s.probabilities.up}% / Down ${s.probabilities.down}%</div></div><div class="box"><div class="label">History Memory</div><div class="val small">${s.history_memory ? `${s.history_memory.message}<br>Breaks: ${s.history_memory.breaks} • Success: ${s.history_memory.success_rate??"-"}%` : "-"}</div></div><div class="box"><div class="label">Entry</div><div class="val small">${entry}<br>Setup: ${p.setup_zone||"-"}<br>Trigger: ${p.trigger_level||"-"}</div></div><div class="box"><div class="label">Timer</div><div class="val timer" data-i="${i}">${fmt(s.timer_seconds)}</div></div></div><div class="title">Master Bias</div>${render(alerts(s,"Master Bias"))}<div class="title">Execution</div>${render(alerts(s,"Execution"))}<div class="title">Close / Exit Plan</div><div class="small">${s.close_rules ? `${s.close_rules.partial_close}<br>${s.close_rules.full_close}<br>${s.close_rules.emergency_close}<br>${s.close_rules.trailing_stop}` : ""}</div><div class="title">Logic</div><div class="small">${s.logic_note}</div></div>`}
async function load(){status.textContent="Updating V20 signals...";try{let r=await fetch("/api/v20/signals",{cache:"no-store"});let d=await r.json();sigs=d.signals||[];grid.innerHTML=sigs.map(card).join("");status.textContent=`Last updated ${new Date().toLocaleTimeString()} • next update in ${refresh}s`;}catch(e){status.textContent="Error: "+e}}
setInterval(()=>{document.querySelectorAll(".timer").forEach(el=>{let i=+el.dataset.i;if(sigs[i]){sigs[i].timer_seconds=Math.max(0,sigs[i].timer_seconds-1);el.textContent=fmt(sigs[i].timer_seconds)}})},1000);
load();setInterval(load,refresh*1000);
</script></body></html>
