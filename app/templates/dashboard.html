<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>MarketMind AI V5 Sniper Pro</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>
:root{--bg:#030712;--card:#0f1b2d;--card2:#142a46;--border:#315985;--text:#f2f7ff;--muted:#9fb3cc;--buy:#2ee59d;--sell:#ff6565;--wait:#ffd166;--blue:#55a8ff;--err:#ff7c7c}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top,#102b52,var(--bg));color:var(--text)}header{padding:22px 28px;border-bottom:1px solid var(--border);background:rgba(3,7,18,.94);position:sticky;top:0;z-index:10}h1{margin:0;font-size:30px}.sub,.status{color:var(--muted);margin-top:8px}.wrap{max-width:1550px;margin:auto;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(390px,1fr));gap:18px}.card{background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:20px;padding:20px;box-shadow:0 16px 36px rgba(0,0,0,.38)}.top{display:flex;justify-content:space-between;gap:10px}.asset{font-size:26px;font-weight:bold}.src{font-size:12px;color:var(--muted);margin-top:5px}.price{font-size:25px;margin-top:12px}.pill{padding:10px 14px;border-radius:999px;font-weight:bold;font-size:12px;text-align:center}.BUY{background:rgba(46,229,157,.18);color:var(--buy);border:1px solid rgba(46,229,157,.45)}.SELL{background:rgba(255,101,101,.18);color:var(--sell);border:1px solid rgba(255,101,101,.45)}.WAIT{background:rgba(255,209,102,.18);color:var(--wait);border:1px solid rgba(255,209,102,.45)}.ERROR{background:rgba(255,124,124,.18);color:var(--err);border:1px solid rgba(255,124,124,.45)}.warn{margin-top:14px;padding:13px;border-radius:14px;background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.35);font-weight:bold;color:#ffe6a8}.err{margin-top:14px;padding:13px;border-radius:14px;background:rgba(255,124,124,.12);border:1px solid rgba(255,124,124,.45);color:#ffd6d6}.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.box{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:13px;padding:11px}.label{color:var(--muted);font-size:12px}.value{font-size:17px;font-weight:bold;margin-top:5px}.mainentry{grid-column:1/3;border-color:rgba(85,168,255,.45);background:rgba(85,168,255,.09)}.title{margin-top:18px;color:var(--blue);font-weight:bold}ul{line-height:1.45;color:#dbeaff}.small{font-size:13px;color:var(--muted)}.footer{text-align:center;color:var(--muted);padding:28px}</style></head><body><header><h1>MarketMind AI V5 — Sniper Pro</h1><div class="sub">Tight scalp intervals • exact close zones • SL to breakeven after TP1 • SB/SMC • live-only data • AJAX {{ refresh }}s • API cache {{ cache }}s</div><div class="status" id="status">Loading...</div></header><div class="wrap"><div id="grid" class="grid"></div></div><div class="footer">Educational assistant only. No guaranteed profits. Test on demo first.</div><script>
const REF={{ refresh }},grid=document.getElementById('grid'),status=document.getElementById('status');let signals=[];function fmt(sec){sec=Math.max(0,Math.floor(sec||0));let m=Math.floor(sec/60),s=sec%60;return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}function cl(a){if(!a)return'WAIT';if(a.includes('BUY'))return'BUY';if(a.includes('SELL'))return'SELL';if(a.includes('ERROR'))return'ERROR';return'WAIT'}function z(e){return e?`${e.low} → ${e.high} (${e.width_pips} pips)`:'-'}function card(x,i){if(x.status!=='live')return `<div class="card"><div class="top"><div><div class="asset">${x.display_name||x.asset}</div><div class="src">LIVE DATA ERROR</div></div><span class="pill ERROR">ERROR</span></div><div class="err">${x.message}<br>${x.error||''}</div></div>`;let c=cl(x.action),p=x.plan;return `<div class="card"><div class="top"><div><div class="asset">${x.display_name}</div><div class="src">${x.source} • ${x.source_time||'-'} • cache ${x.cache_age}s</div></div><span class="pill ${c}">${x.action}</span></div><div class="price">Price: <b>${x.price}</b></div><div class="small">Quality ${x.quality}% • raw score ${x.raw_score} • ${x.trade_type}</div><div class="warn">⚠️ ${x.warning}</div><div class="metrics"><div class="box mainentry"><div class="label">SNIPER ENTRY INTERVAL</div><div class="value">${z(p.entry)}</div></div><div class="box"><div class="label">Signal Timer</div><div class="value timer" data-i="${i}">${fmt(p.timer_seconds)}</div></div><div class="box"><div class="label">Stop Loss</div><div class="value">${p.stop_loss}</div></div><div class="box"><div class="label">TP1 / Partial Close</div><div class="value">${p.take_profit_1}</div></div><div class="box"><div class="label">TP2</div><div class="value">${p.take_profit_2}</div></div><div class="box"><div class="label">FULL CLOSE</div><div class="value">${p.full_close}</div></div><div class="box"><div class="label">Invalidation</div><div class="value">${p.invalidation}</div></div><div class="box"><div class="label">News Countdown</div><div class="value">${fmt(x.news.next_event.countdown_seconds)}</div></div><div class="box"><div class="label">London Open</div><div class="value">${fmt(x.session.london_open_countdown)}</div></div><div class="box"><div class="label">NY Open</div><div class="value">${fmt(x.session.new_york_open_countdown)}</div></div></div><div class="title">Trade Management</div><ul><li>${p.move_sl_rule}</li><li>Cancel signal when timer expires or invalidation is hit.</li><li>Do not chase outside the entry interval.</li></ul><div class="title">SB/SMC Evidence</div><ul><li>${x.sb_model.liquidity_sweep.reason}</li><li>${x.sb_model.fvg.reason}</li><li>${x.sb_model.structure.reason}</li></ul><div class="title">Reasons</div><ul>${x.reasons.map(r=>`<li>${r}</li>`).join('')}</ul></div>`}
async function load(){status.textContent='Updating V5 sniper signals...';try{let r=await fetch('/api/v5/signals',{cache:'no-store'}),d=await r.json();signals=d.signals||[];grid.innerHTML=signals.map(card).join('');status.textContent=`Last updated ${new Date().toLocaleTimeString()} • next update in ${REF}s`;}catch(e){status.textContent='Load error: '+e}}setInterval(()=>{document.querySelectorAll('.timer').forEach(el=>{let i=+el.dataset.i;if(signals[i]&&signals[i].plan){signals[i].plan.timer_seconds=Math.max(0,signals[i].plan.timer_seconds-1);el.textContent=fmt(signals[i].plan.timer_seconds)}})},1000);load();setInterval(load,REF*1000);
</script></body></html>
