<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MarketMind AI V11</title>
<style>
:root{--bg:#050b16;--card:#101d31;--card2:#173457;--border:#3a68a0;--text:#eef6ff;--muted:#9fb2cc;--buy:#2ed47a;--sell:#ff6464;--wait:#f2c94c;--blue:#58a6ff;--err:#ff7676}
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:radial-gradient(circle at top,#123968,var(--bg));color:var(--text)}header{position:sticky;top:0;z-index:5;padding:22px 28px;background:rgba(5,11,22,.95);border-bottom:1px solid var(--border)}h1{margin:0;font-size:30px}.sub,.status{color:var(--muted);margin-top:8px}.wrap{max-width:1600px;margin:auto;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(450px,1fr));gap:18px}.card{background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:20px;padding:20px;box-shadow:0 14px 35px rgba(0,0,0,.35)}.err{border-color:var(--err)}.top{display:flex;justify-content:space-between;gap:10px}.asset{font-size:25px;font-weight:800}.src{font-size:12px;color:var(--muted);margin-top:4px}.price{font-size:28px;margin-top:12px}.pill{border-radius:999px;padding:10px 14px;font-weight:900;font-size:13px;text-align:center;height:max-content}.buy{background:rgba(46,212,122,.18);border:1px solid rgba(46,212,122,.45);color:var(--buy)}.sell{background:rgba(255,100,100,.18);border:1px solid rgba(255,100,100,.45);color:var(--sell)}.wait{background:rgba(242,201,76,.18);border:1px solid rgba(242,201,76,.45);color:var(--wait)}.warn{margin-top:14px;padding:12px;border-radius:12px;background:rgba(255,197,66,.12);border:1px solid rgba(255,197,66,.35);color:#ffe0a3;font-weight:bold}.boxes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}.box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:11px}.label{color:var(--muted);font-size:12px}.val{font-size:18px;font-weight:800;margin-top:5px}.entry .val{font-size:20px;color:#cfe7ff}.title{margin-top:18px;color:var(--blue);font-weight:900}.alert{margin-top:8px;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px}.alert.sell{border-color:rgba(255,100,100,.5);color:#ffd6d6}.alert.buy{border-color:rgba(46,212,122,.5);color:#d6ffe8}.alert.neutral{border-color:rgba(242,201,76,.4);color:#fff0b8}.small{font-size:13px;color:var(--muted)}.errorbox{padding:14px;margin-top:14px;border-radius:12px;background:rgba(255,118,118,.12);border:1px solid rgba(255,118,118,.5);color:#ffd2d2;font-weight:bold}
</style></head><body><header><h1>MarketMind AI V11 — Tick Memory Pro</h1><div class="sub">Finnhub live quote • Neon tick storage • self-built candles • ML-ready memory</div><div id="status" class="status">Loading...</div></header><div class="wrap"><div id="grid" class="grid"></div></div>
<script>
const refresh={{ refresh }};let sigs=[];const grid=document.getElementById("grid"),status=document.getElementById("status");
function fmt(sec){sec=Math.max(0,Math.floor(sec||0));let m=Math.floor(sec/60),s=sec%60;return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}
function cls(x){if(!x)return"wait";if(x.includes("BUY"))return"buy";if(x.includes("SELL"))return"sell";return"wait"}
function alertCls(d){if(d==="BUY")return"buy";if(d==="SELL")return"sell";return"neutral"}
function layerAlerts(s,layer){return (s.alerts||[]).filter(a=>a.layer===layer)}
function renderAlerts(arr){return arr.length?arr.map(a=>`<div class="alert ${alertCls(a.direction)}"><b>${a.model}</b> • ${a.direction} • score ${a.score}<br><span class="small">${a.message}<br>${a.interpretation||""}</span></div>`).join(""):`<div class="alert neutral">No active alert.</div>`}
function card(s,i){if(s.status==="collecting")return `<div class="card"><div class="asset">${s.display}</div><div class="warn">⏳ ${s.message}<br><span class="small">Leave the dashboard open. It collects ticks every refresh.</span></div></div>`;if(s.status!=="live")return `<div class="card err"><div class="asset">${s.display||s.asset}</div><div class="errorbox">⚠️ ${s.message}<br>${s.error||""}</div></div>`;
let p=s.plan;let entry=p.has_exact_entry?`<div class="box entry"><div class="label">EXACT ${s.master_bias} ENTRY (${p.direction})</div><div class="val">${p.exact_entry} (${p.entry_pips} pips)</div></div>`:`<div class="box entry"><div class="label">ENTRY STATUS</div><div class="val">${p.exact_entry}</div><div class="small">Setup: ${p.setup_zone||"-"}<br>Trigger: ${p.trigger_level||"-"}</div></div>`;
let management=p.has_exact_entry?`<div class="box"><div class="label">Stop Loss</div><div class="val">${p.stop_loss}</div></div><div class="box"><div class="label">TP1</div><div class="val">${p.tp1_partial_close}</div></div><div class="box"><div class="label">TP2</div><div class="val">${p.tp2}</div></div><div class="box"><div class="label">Full Close</div><div class="val">${p.full_close}</div></div>`:`<div class="box"><div class="label">Risk</div><div class="val">${s.risk_level}</div></div><div class="box"><div class="label">Tick Memory</div><div class="val">${s.tick_count} ticks</div></div>`;
return `<div class="card"><div class="top"><div><div class="asset">${s.display}</div><div class="src">${s.source} • ticks ${s.tick_count} • cache ${s.cache_age}s</div></div><div class="pill ${cls(s.final_action)}">${s.final_action}</div></div><div class="price">Price: <b>${s.price}</b></div><div class="small">Grade ${s.grade} • Confidence ${s.confidence}% • Risk ${s.risk_level} • Stage ${s.stage}</div><div class="warn">⚠️ ${s.warning}<br><span class="small">${s.conflict_interpretation}</span></div><div class="boxes"><div class="box"><div class="label">Grade</div><div class="val">${s.grade}</div></div><div class="box"><div class="label">Probability</div><div class="val small">Up ${s.probabilities.up}% • Sideways ${s.probabilities.sideways}% • Down ${s.probabilities.down}%</div></div>${entry}<div class="box"><div class="label">Timer</div><div class="val timer" data-i="${i}">${fmt(s.timer_seconds)}</div></div>${management}<div class="box"><div class="label">Frequency Profile</div><div class="val small">POC ${s.profile.poc}<br>VAL ${s.profile.val} / VAH ${s.profile.vah}</div></div></div><div class="title">Decision Layers</div><div><b>1) Master Bias</b>${renderAlerts(layerAlerts(s,"Master Bias"))}</div><div><b>2) Execution</b>${renderAlerts(layerAlerts(s,"Execution"))}</div><div class="title">Logic Note</div><div class="small">${s.logic_note}</div></div>`}
async function load(){status.textContent="Updating V11 signals...";try{let r=await fetch("/api/v11/signals",{cache:"no-store"});let d=await r.json();sigs=d.signals||[];grid.innerHTML=sigs.map(card).join("");status.textContent=`Last updated ${new Date().toLocaleTimeString()} • next update in ${refresh}s`;}catch(e){status.textContent="Error: "+e}}
setInterval(()=>{document.querySelectorAll(".timer").forEach(el=>{let i=+el.dataset.i;if(sigs[i]){sigs[i].timer_seconds=Math.max(0,sigs[i].timer_seconds-1);el.textContent=fmt(sigs[i].timer_seconds)}})},1000);
load();setInterval(load,refresh*1000);
</script></body></html>
