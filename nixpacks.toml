[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "python --version",
  "python -m ensurepip --upgrade || true",
  "python -m pip install --upgrade pip",
  "python -m pip install -r requirements.txt"
]

[start]
cmd = "python -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 180"
